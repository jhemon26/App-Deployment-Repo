services:
  idoc-web:
    build:
      context: ../../idoc-app
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-https://idoc-backend-prod-production.up.railway.app/api/v1}
    container_name: idoc-web
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2
    container_name: idoc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - idoc-web

volumes:
  caddy_data:
  caddy_config:
